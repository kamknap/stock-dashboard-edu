name: CI · api

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/ci-api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
